<!DOCTYPE html>
<!--
  Harness LOCAL de verificación visual de la vista Agenda + toggle.
  No subir a producción. Carga el tasks.js REAL con fetch simulado.
-->
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview · Agenda tareas</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/iconoir-icons/iconoir@main/css/iconoir.css">
    <link rel="stylesheet" href="/assets/css/tokens.css">
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/tasks.css">
    <style>
        body { font-family: 'Geist', sans-serif; padding: 2rem; max-width: 760px; margin: 0 auto; }
        .header-actions { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="header-actions">
        <div class="view-toggle" id="view-toggle" role="group">
            <button type="button" class="view-toggle-btn" data-view="agenda" onclick="setTasksView('agenda')"><i class="iconoir-calendar"></i><span>Agenda</span></button>
            <button type="button" class="view-toggle-btn" data-view="list" onclick="setTasksView('list')"><i class="iconoir-list"></i><span>Lista</span></button>
        </div>
        <select id="app-filter"><option value="">Todas</option></select>
        <label><input type="checkbox" id="show-completed" checked> Completadas</label>
        <label><input type="checkbox" id="show-shared"> Equipo</label>
    </div>

    <!-- Elementos que tasks.js espera (quick-add) -->
    <div style="display:none">
        <input id="quick-add-input"><button id="expand-btn"></button>
        <div id="quick-add-expanded"></div><div id="quick-add-chips"></div>
        <select id="quick-add-app"></select><input id="quick-add-due-date"><textarea id="quick-add-description"></textarea>
        <div id="task-file-upload"></div><input type="file" id="task-file-input">
    </div>

    <div class="tasks-list" id="tasks-list"></div>
    <div class="empty-state" id="empty-state" style="display:none"><h3>Sin tareas</h3></div>
    <div id="toast-container"></div>

    <script>
        const QUICK_APPS = [{ id: 1, name: 'Puri' }];
        // Fechas relativas a hoy para cubrir todos los buckets.
        function iso(offset){ const d=new Date(); d.setDate(d.getDate()+offset); return d.toISOString().slice(0,10); }
        const MOCK = [
            { id:1, title:'Renovar dominio (vencida)', due_date:iso(-3), app_name:'Puri', is_completed:0, is_shared:0, share_count:0, attachment_count:0 },
            { id:2, title:'Llamar al cliente', due_date:iso(0), app_name:null, is_completed:0, is_shared:1, share_count:0, attachment_count:0 },
            { id:3, title:'Enviar propuesta', due_date:iso(1), app_name:'Puri', is_completed:0, is_shared:0, share_count:2, attachment_count:1 },
            { id:4, title:'Revisar informe semanal', due_date:iso(4), app_name:null, is_completed:0, is_shared:0, share_count:0, attachment_count:0 },
            { id:5, title:'Planificar Q3', due_date:iso(20), app_name:'Puri', is_completed:0, is_shared:0, share_count:0, attachment_count:0 },
            { id:6, title:'Idea suelta sin fecha', due_date:null, app_name:null, is_completed:0, is_shared:0, share_count:0, attachment_count:0 },
            { id:7, title:'Tarea ya hecha', due_date:iso(-1), app_name:null, is_completed:1, is_shared:0, share_count:0, attachment_count:0 }
        ];
        // Simula las APIs que tasks.js consulta en el arranque.
        const realFetch = window.fetch;
        window.fetch = function(url, opts){
            if (typeof url === 'string' && url.indexOf('/api/tasks.php') === 0)
                return Promise.resolve({ json: () => Promise.resolve({ success:true, data: MOCK }) });
            if (typeof url === 'string' && url.indexOf('/api/task-shares.php') === 0)
                return Promise.resolve({ json: () => Promise.resolve({ success:true, data: [] }) });
            return Promise.resolve({ json: () => Promise.resolve({ success:true, data: [] }) });
        };
    </script>
    <script src="/assets/js/task-parser.js?v=2"></script>
    <script src="/assets/js/tasks.js?v=3"></script>
</body>
</html>
