<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview AI Inbox</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
    <main class="main-content" style="margin:0">
        <section id="ai-step-note" class="ai-step" hidden>
            <textarea id="ai-note-input"></textarea><span id="ai-note-counter"></span>
            <p id="ai-note-error" hidden></p>
        </section>
        <section id="ai-step-loading" class="ai-step" hidden></section>

        <section id="ai-step-review" class="ai-step">
            <div class="ai-review-intro">
                <i class="iconoir-eye"></i>
                <div>
                    <strong id="ai-review-summary">La IA ha detectado varios elementos.</strong>
                    <p>Revisa cada propuesta: puedes <strong>editar el texto, cambiar el tipo, la app, la prioridad y
                        las subtareas</strong>, o descartar lo que no quieras.
                        <strong>No se creará nada hasta que pulses "Crear seleccionados".</strong></p>
                </div>
            </div>
            <div id="ai-review-list"></div>
            <div class="ai-review-actions">
                <button class="btn btn-outline"><i class="iconoir-arrow-left"></i> Volver a la nota</button>
                <button id="ai-confirm-btn" class="btn btn-primary"><i class="iconoir-check"></i>
                    <span id="ai-confirm-label">Crear seleccionados</span></button>
            </div>
            <p id="ai-review-error" class="ai-error" hidden></p>
        </section>
        <section id="ai-step-done" class="ai-step" hidden></section>
    </main>
